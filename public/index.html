<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SayChat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="rose">

    <!-- ELEMENTO DE AUDIO -->
    <audio id="noti-sound" src="noti.mp3" preload="auto"></audio>

    <!-- PANTALLA DE ACCESO -->
    <div id="auth-screen" class="window-screen">
        <div class="minimal-auth-card animate-fade">
            <!-- INICIAR SESIÓN -->
            <div id="login-area" class="auth-view">
                <h2>Iniciar Sesión</h2>
                <div class="input-form-wrapper">
                    <input type="text" id="login-nickname" placeholder="Username / ID" autocomplete="off">
                    <input type="password" id="login-password" placeholder="Contraseña">
                    <button type="button" id="btn-login-submit" class="btn-minimal">Entrar</button>
                </div>
                <p class="switch-text">¿No tienes cuenta? <span id="go-to-register">Regístrate</span></p>
            </div>

            <!-- REGISTRARSE -->
            <div id="register-area" class="auth-view hidden">
                <h2>Registrarse</h2>
                <div class="input-form-wrapper">
                    <input type="text" id="reg-name" placeholder="Tu nombre real (3-50 caracteres)" autocomplete="off">
                    <input type="text" id="reg-nickname" placeholder="Crea tu Username / ID (4-15 caracteres)" autocomplete="off">
                    <input type="password" id="reg-password" placeholder="Establecer contraseña">
                    
                    <div class="minimal-file-zone">
                        <label for="reg-avatar" class="file-btn" id="label-reg-avatar">Seleccionar avatar</label>
                        <input type="file" id="reg-avatar" accept="image/*">
                        <div class="avatar-holder">
                            <img id="reg-preview" src="" alt="Preview" class="hidden custom-avatar">
                        </div>
                    </div>
                    <button type="button" id="btn-register-submit" class="btn-minimal">Registrarse</button>
                </div>
                <p class="switch-text">¿Ya tienes cuenta? <span id="go-to-login">Inicia sesión</span></p>
            </div>
        </div>
    </div>

    <!-- INTERFAZ DEL CHAT COMPLETA -->
    <div id="chat-screen" class="window-screen hidden">
        <div class="chat-main-wrapper">
            
            <!-- SIDEBAR IZQUIERDO PERMANENTE -->
            <aside id="sidebar-panel" class="minimal-sidebar">
                <div class="sidebar-top-content">
                    
                    <!-- Pestañas Superiores de Canal -->
                    <div class="sidebar-actions-header">
                        <button type="button" id="btn-nav-global" class="nav-tab active"># Chat Global</button>
                        <button type="button" id="logout-btn" class="btn-icon-logout" title="Desconectarse">✕</button>
                    </div>

                    <!-- Lista Fija de Gente Conectada / Chats Privados -->
                    <div id="users-list-area">
                        <span class="panel-section-title">Directos / Miembros</span>
                        <div id="users-connected-list"></div>
                    </div>

                    <!-- Panel de Ajustes Inferior Expandible/Colapsable -->
                    <div id="settings-area" class="settings-drawer collapsed">
                        <div class="profile-preview-card">
                            <label for="edit-avatar" class="avatar-edit-label" title="Cambiar Foto">
                                <img id="current-user-avatar" src="" alt="Avatar" class="custom-avatar editable-avatar">
                                <input type="file" id="edit-avatar" accept="image/*">
                            </label>
                            <div class="profile-text">
                                <div class="editable-name-container" id="name-container">
                                    <h3 id="current-user-name" title="Click para editar">---</h3>
                                    <input type="text" id="edit-name-input" class="hidden-edit-input">
                                    <span class="pencil-icon">✎</span>
                                </div>
                                <span id="current-user-nickname">@---</span>
                            </div>
                        </div>

                        <span class="panel-section-title">Tema Visual</span>
                        <div class="theme-picker">
                            <button type="button" class="theme-circle dot-rose active" data-set-theme="rose"></button>
                            <button type="button" class="theme-circle dot-cyan" data-set-theme="cyan"></button>
                            <button type="button" class="theme-circle dot-amber" data-set-theme="amber"></button>
                            <button type="button" class="theme-circle dot-emerald" data-set-theme="emerald"></button>
                            <button type="button" class="theme-circle dot-light" data-set-theme="light" title="Tema Claro"></button>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- ÁREA DE CONVERSACIÓN -->
            <section class="chat-viewport">
                <header class="chat-viewport-header">
                    <div class="header-left">
                        <span id="header-channel-title" class="chat-title">SayChat // Global</span>
                    </div>
                    <!-- TUERCA DE AJUSTES EN EL EXTREMO DERECHO -->
                    <div class="header-right">
                        <button type="button" id="toggle-settings-btn" class="btn-toggle-gear" title="Ajustes de Perfil">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        </button>
                    </div>
                </header>
                
                <main id="chat-box">
                    <!-- Mensajes inyectados -->
                </main>
                
                <!-- STICKERS POPUP -->
                <div id="stickers-panel" class="stickers-popup hidden">
                    <div class="stickers-header">
                        <span>Mis Stickers</span>
                        <label for="upload-sticker-input" class="btn-upload-stk">＋ Subir</label>
                        <input type="file" id="upload-sticker-input" accept="image/*" class="hidden">
                    </div>
                    <div id="stickers-grid" class="stickers-grid-container"></div>
                </div>

                <div id="chat-form-mock">
                    <button type="button" id="btn-toggle-stickers" class="btn-stk-trigger">☺</button>
                    <input type="text" id="message-input" placeholder="Escribe un mensaje..." autocomplete="off">
                    <button type="button" id="btn-send-message" class="btn-send-minimal">Enviar</button>
                </div>
            </section>

        </div>
    </div>

    <!-- TOAST IN-APP -->
    <div id="toast-notification" class="toast-popup hidden">Cambios guardados</div>

    <script type="module" src="app.js"></script>
</body>
</html>
