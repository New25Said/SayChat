<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SayChat // Minimalist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="rose">

    <div id="auth-screen" class="window-screen">
        <div class="minimal-auth-card animate-fade">
            <div id="login-area" class="auth-view">
                <h2>Iniciar Sesión</h2>
                <form id="login-form" onsubmit="return false;">
                    <input type="text" id="login-nickname" placeholder="Nombre de usuario" required autocomplete="off">
                    <input type="password" id="login-password" placeholder="Contraseña" required>
                    <button type="button" id="btn-login-submit" class="btn-minimal">Entrar</button>
                </form>
                <p class="switch-text">¿No tienes cuenta? <span id="go-to-register">Crear una ahora</span></p>
            </div>

            <div id="register-area" class="auth-view hidden">
                <h2>Registrarse</h2>
                <form id="register-form" onsubmit="return false;">
                    <input type="text" id="reg-name" placeholder="Tu nombre público" required autocomplete="off">
                    <input type="text" id="reg-nickname" placeholder="Elige un nickname" required autocomplete="off">
                    <input type="password" id="reg-password" placeholder="Establecer contraseña" required>
                    
                    <div class="minimal-file-zone">
                        <label for="reg-avatar" class="file-btn">Seleccionar avatar</label>
                        <input type="file" id="reg-avatar" accept="image/*">
                        <div class="avatar-holder">
                            <img id="reg-preview" src="" alt="Preview" class="hidden custom-avatar">
                        </div>
                    </div>
                    <button type="button" id="btn-register-submit" class="btn-minimal">Completar registro</button>
                </form>
                <p class="switch-text">¿Ya tienes cuenta? <span id="go-to-login">Iniciar sesión</span></p>
            </div>
        </div>
    </div>

    <div id="chat-screen" class="window-screen hidden">
        <div class="chat-main-wrapper">
            
            <aside id="sidebar-panel" class="minimal-sidebar">
                <div class="sidebar-top-content">
                    <div class="profile-preview-card">
                        <img id="current-user-avatar" src="" alt="Avatar" class="custom-avatar">
                        <div class="profile-text">
                            <h3 id="current-user-name">---</h3>
                            <span id="current-user-nickname">@---</span>
                        </div>
                    </div>

                    <div class="profile-settings-panel">
                        <span class="panel-section-title">Editar Perfil</span>
                        <input type="text" id="edit-name" placeholder="Modificar nombre">
                        <div class="mini-upload-trigger">
                            <label for="edit-avatar">Cambiar foto de perfil</label>
                            <input type="file" id="edit-avatar" accept="image/*">
                        </div>
                        <button type="button" id="save-profile-btn" class="btn-action-outline">Guardar Cambios</button>
                    </div>
                </div>

                <div class="sidebar-bottom-content">
                    <span class="panel-section-title">Tema Visual</span>
                    <div class="theme-picker">
                        <button type="button" class="theme-circle dot-rose active" data-set-theme="rose"></button>
                        <button type="button" class="theme-circle dot-cyan" data-set-theme="cyan"></button>
                        <button type="button" class="theme-circle dot-amber" data-set-theme="amber"></button>
                        <button type="button" class="theme-circle dot-emerald" data-set-theme="emerald"></button>
                    </div>
                    <button type="button" id="logout-btn" class="btn-disconnect">Cerrar Sesión</button>
                </div>
            </aside>

            <section class="chat-viewport">
                <header class="chat-viewport-header">
                    <div class="header-left">
                        <button type="button" id="toggle-sidebar-btn" class="btn-toggle" title="Ocultar/Mostrar Menú">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                        </button>
                        <span class="chat-title">sala-general</span>
                    </div>
                </header>
                
                <main id="chat-box">
                    </main>
                
                <form id="chat-form" onsubmit="return false;">
                    <input type="text" id="message-input" placeholder="Escribe un mensaje aquí..." required autocomplete="off">
                    <button type="button" id="btn-send-message" class="btn-send-minimal">Enviar</button>
                </form>
            </section>

        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
