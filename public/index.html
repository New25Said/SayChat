<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multichat Compact Retro-Modern</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="rose">

    <div id="auth-screen" class="window-screen">
        <div class="compact-box animate-fade">
            <div class="box-header">
                <span class="box-title">⚡ SEICHAT // AUTH_SYS</span>
            </div>
            
            <div id="login-area">
                <h2>Iniciar Sesión</h2>
                <form id="login-form" onsubmit="return false;">
                    <input type="text" id="login-nickname" placeholder="Nickname (ej: sai)" required autocomplete="off">
                    <input type="password" id="login-password" placeholder="Contraseña" required>
                    <button type="button" id="btn-login-submit" class="btn-retro">Ingresar</button>
                </form>
                <p class="switch-text">¿Nuevo en el servidor? <span id="go-to-register">Registrar cuenta</span></p>
            </div>

            <div id="register-area" class="hidden">
                <h2>Crear Cuenta</h2>
                <form id="register-form" onsubmit="return false;">
                    <input type="text" id="reg-name" placeholder="Nombre Mostrado" required autocomplete="off">
                    <input type="text" id="reg-nickname" placeholder="Nickname Único (ID)" required autocomplete="off">
                    <input type="password" id="reg-password" placeholder="Contraseña" required>
                    
                    <div class="file-zone">
                        <label for="reg-avatar">Seleccionar Foto Perfil</label>
                        <input type="file" id="reg-avatar" accept="image/*">
                        <img id="reg-preview" src="" alt="Preview" class="hidden custom-avatar">
                    </div>
                    <button type="button" id="btn-register-submit" class="btn-retro">Inicializar Cuenta</button>
                </form>
                <p class="switch-text">¿Ya tienes ID? <span id="go-to-login">Volver a Login</span></p>
            </div>
        </div>
    </div>

    <div id="chat-screen" class="window-screen hidden">
        <div class="chat-app-container animate-fade">
            
            <aside class="compact-sidebar">
                <div class="sidebar-top">
                    <div class="box-header"><span class="box-title">USER_INFO</span></div>
                    
                    <div class="profile-card">
                        <img id="current-user-avatar" src="" alt="Avatar" class="custom-avatar">
                        <div class="profile-details">
                            <h3 id="current-user-name">---</h3>
                            <span id="current-user-nickname">@---</span>
                        </div>
                    </div>

                    <div class="edit-profile-box">
                        <span class="section-label">EDITAR PERFIL</span>
                        <input type="text" id="edit-name" placeholder="Nuevo Nombre">
                        <div class="file-zone-mini">
                            <label for="edit-avatar">Cambiar Foto</label>
                            <input type="file" id="edit-avatar" accept="image/*">
                        </div>
                        <button type="button" id="save-profile-btn" class="btn-retro-small">Actualizar Perfil</button>
                    </div>
                </div>

                <div class="sidebar-bottom">
                    <span class="section-label">TEMA PRINCIPAL</span>
                    <div class="theme-selector">
                        <button type="button" class="theme-dot dot-rose active" data-set-theme="rose" title="Rosa/Rojo"></button>
                        <button type="button" class="theme-dot dot-cyan" data-set-theme="cyan" title="Cian/Cyber"></button>
                        <button type="button" class="theme-dot dot-amber" data-set-theme="amber" title="Ámbar/Retro"></button>
                        <button type="button" class="theme-dot dot-emerald" data-set-theme="emerald" title="Esmeralda"></button>
                    </div>
                    <button type="button" id="logout-btn" class="btn-logout">Desconectarse</button>
                </div>
            </aside>

            <section class="chat-main">
                <header class="main-header">
                    <span class="channel-indicator"># sala-publica-general</span>
                </header>
                
                <main id="chat-box">
                    </main>
                
                <form id="chat-form" onsubmit="return false;">
                    <input type="text" id="message-input" placeholder="Enviar mensaje a #sala-general..." required autocomplete="off">
                    <button type="button" id="btn-send-message" class="btn-retro">Enviar</button>
                </form>
            </section>

        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
