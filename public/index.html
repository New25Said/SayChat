<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multichat Fullscreen Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="auth-screen">
        <div class="auth-box">
            <h2>💬 Iniciar Sesión</h2>
            <form id="login-form">
                <input type="text" id="login-nickname" placeholder="Nickname (ej: @sai)" required autocomplete="off">
                <input type="password" id="login-password" placeholder="Contraseña" required>
                <button type="submit" class="btn-main">Ingresar</button>
            </form>
            <p class="auth-switch">¿No tienes cuenta? <span id="go-to-register">Regístrate aquí</span></p>
        </div>
    </div>

    <div id="register-screen" class="auth-screen hidden">
        <div class="auth-box">
            <h2>🚀 Crear Cuenta</h2>
            <form id="register-form">
                <input type="text" id="reg-name" placeholder="Nombre Completo" required autocomplete="off">
                <input type="text" id="reg-nickname" placeholder="Nickname Único (ej: @sai)" required autocomplete="off">
                <input type="password" id="reg-password" placeholder="Contraseña" required>
                
                <div class="file-select-area">
                    <label for="reg-avatar">Subir Foto de Perfil:</label>
                    <input type="file" id="reg-avatar" accept="image/*" required>
                    <div id="avatar-preview-container">
                        <img id="avatar-preview" src="" alt="Vista previa" class="hidden">
                    </div>
                </div>

                <button type="submit" class="btn-main">Crear Cuenta e Ingresar</button>
            </form>
            <p class="auth-switch">¿Ya tienes cuenta? <span id="go-to-login">Inicia sesión aquí</span></p>
        </div>
    </div>

    <div id="chat-screen" class="chat-fullscreen hidden">
        <aside class="sidebar">
            <div class="sidebar-profile">
                <img id="current-user-avatar" src="" alt="Mi Foto">
                <div class="profile-info">
                    <h3 id="current-user-name">Cargando...</h3>
                    <span id="current-user-nickname">@nick</span>
                </div>
            </div>
            <div class="sidebar-actions">
                <button id="logout-btn" class="btn-logout">Cerrar Sesión</button>
            </div>
        </aside>

        <section class="chat-main-area">
            <header class="chat-header">
                <h2>💬 Sala Pública General</h2>
            </header>
            
            <main id="chat-box">
                </main>
            
            <form id="chat-form">
                <input type="text" id="message-input" placeholder="Escribe tu mensaje aquí..." required autocomplete="off">
                <button type="submit">Enviar</button>
            </form>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBz2zHkMLxDFwha_h51SjAoYzQtoUgqiiY",
            authDomain: "seichato.firebaseapp.com",
            databaseURL: "https://seichato-default-rtdb.firebaseio.com",
            projectId: "seichato",
            storageBucket: "seichato.firebasestorage.app",
            messagingSenderId: "141497749351",
            appId: "1:141497749351:web:163d6a94738bf5acdfe9c2",
            measurementId: "G-9635Z02KGL"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db);

        // Pantallas
        const loginScreen = document.getElementById('login-screen');
        const registerScreen = document.getElementById('register-screen');
        const chatScreen = document.getElementById('chat-screen');

        // Formularios y Elementos
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const chatForm = document.getElementById('chat-form');
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const regAvatar = document.getElementById('reg-avatar');
        const avatarPreview = document.getElementById('avatar-preview');
        const logoutBtn = document.getElementById('logout-btn');

        let currentUser = null;
        let base64Avatar = "";

        // Cambios de Pantalla manuales
        document.getElementById('go-to-register').addEventListener('click', () => {
            loginScreen.classList.add('hidden');
            registerScreen.classList.remove('hidden');
        });
        document.getElementById('go-to-login').addEventListener('click', () => {
            registerScreen.classList.add('hidden');
            loginScreen.classList.remove('hidden');
        });

        // Convertir Imagen subida a Base64
        regAvatar.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    base64Avatar = reader.result; // Aquí está el string Base64 largo
                    avatarPreview.src = base64Avatar;
                    avatarPreview.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        // REGISTRO DE USUARIO
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value.trim();
            let nickname = document.getElementById('reg-nickname').value.trim().toLowerCase();
            if (!nickname.startsWith('@')) nickname = '@' + nickname;
            const password = document.getElementById('reg-password').value;

            if (!base64Avatar) {
                alert("Por favor sube una foto de perfil.");
                return;
            }

            // Limpiar el nickname para usarlo como llave limpia en Firebase sin el '@'
            const userKey = nickname.replace('@', '');

            try {
                const snapshot = await get(child(dbRef, `users/${userKey}`));
                if (snapshot.exists()) {
                    alert("Este nickname ya está registrado. Elige otro.");
                } else {
                    // Guardar nueva cuenta en Firebase
                    const userData = { name, nickname, password, avatar: base64Avatar };
                    const userRef = ref(db, `users/${userKey}`);
                    
                    // Guardamos la configuración completa del usuario
                    await push(userRef, userData); // Nota: para simplificar estructuración directa, usamos set o push.
                    // Para que sea una llave directa sin IDs raros:
                    const { set } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js");
                    await set(ref(db, `users/${userKey}`), userData);

                    currentUser = userData;
                    localStorage.setItem('chat_session_v2', JSON.stringify(currentUser));
                    initChatUI();
                }
            } catch (error) {
                console.error(error);
                alert("Error al registrar cuenta.");
            }
        });

        // INICIO DE SESIÓN
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            let nickname = document.getElementById('login-nickname').value.trim().toLowerCase();
            if (!nickname.startsWith('@')) nickname = '@' + nickname;
            const password = document.getElementById('login-password').value;

            const userKey = nickname.replace('@', '');

            try {
                const snapshot = await get(child(dbRef, `users/${userKey}`));
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    if (userData.password === password) {
                        currentUser = userData;
                        localStorage.setItem('chat_session_v2', JSON.stringify(currentUser));
                        initChatUI();
                    } else {
                        alert("Contraseña incorrecta.");
                    }
                } else {
                    alert("El usuario no existe.");
                }
            } catch (error) {
                console.error(error);
                alert("Error al iniciar sesión.");
            }
        });

        // CERRAR SESIÓN
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('chat_session_v2');
            location.reload(); // Recarga y limpia la app volviendo al Login
        });

        // Inicializar interfaz del chat
        function initChatUI() {
            loginScreen.classList.add('hidden');
            registerScreen.classList.add('hidden');
            chatScreen.classList.remove('hidden');

            document.getElementById('current-user-avatar').src = currentUser.avatar;
            document.getElementById('current-user-name').textContent = currentUser.name;
            document.getElementById('current-user-nickname').textContent = currentUser.nickname;
        }

        // Formato de hora
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // ENVIAR MENSAJE
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const message = messageInput.value.trim();

            if (message && currentUser) {
                push(ref(db, 'messages'), {
                    nickname: currentUser.nickname,
                    name: currentUser.name,
                    avatar: currentUser.avatar, // Guardamos la foto en el mensaje para render instantáneo rápido
                    message: message,
                    timestamp: Date.now()
                });
                messageInput.value = '';
            }
        });

        // ESCUCHAR MENSAJES EN TIEMPO REAL
        onChildAdded(ref(db, 'messages'), (snapshot) => {
            const data = snapshot.val();
            const messageElement = document.createElement('div');
            messageElement.classList.add('msg-row');

            const isMe = currentUser && data.nickname === currentUser.nickname;
            if (isMe) messageElement.classList.add('msg-row-me');

            messageElement.innerHTML = `
                <img src="${data.avatar}" alt="Avatar" class="msg-img">
                <div class="msg-bubble">
                    <div class="msg-meta">
                        <span class="meta-name">${data.name}</span>
                        <span class="meta-nick">${data.nickname}</span>
                    </div>
                    <p class="msg-body">${data.message}</p>
                    <span class="msg-time">${formatTime(data.timestamp)}</span>
                </div>
            `;

            chatBox.appendChild(messageElement);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        // Comprobar persistencia al cargar
        const savedSession = localStorage.getItem('chat_session_v2');
        if (savedSession) {
            currentUser = JSON.parse(savedSession);
            initChatUI();
        }
    </script>
</body>
</html>
