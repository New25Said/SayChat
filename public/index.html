<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SayChat v4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="noti-sound" src="noti.mp3" preload="auto"></audio>

    <!-- PANTALLA DE ACCESO -->
    <div id="auth-screen" class="window-screen">
        <div class="whatsapp-auth-card animate-fade">
            <div class="auth-header">
                <h1>SayChat <span style="font-size:12px; color:var(--accent)">v4</span></h1>
                <p>Tu espacio de mensajería en vivo</p>
            </div>
            
            <!-- INICIAR SESIÓN -->
            <div id="login-area" class="auth-view">
                <div class="input-form-wrapper">
                    <input type="text" id="login-nickname" placeholder="Username / ID" autocomplete="off">
                    <input type="password" id="login-password" placeholder="Contraseña">
                    <button type="button" id="btn-login-submit" class="btn-whatsapp">Entrar</button>
                </div>
                <p class="switch-text">¿No tienes cuenta? <span id="go-to-register">Regístrate</span></p>
            </div>

            <!-- REGISTRARSE -->
            <div id="register-area" class="auth-view hidden">
                <div class="input-form-wrapper">
                    <input type="text" id="reg-name" placeholder="Tu nombre real (3-50 letras)" autocomplete="off">
                    <input type="text" id="reg-nickname" placeholder="Username / ID (4-15 letras)" autocomplete="off">
                    <input type="password" id="reg-password" placeholder="Establecer contraseña">
                    
                    <div class="whatsapp-file-zone">
                        <label for="reg-avatar" class="file-btn" id="label-reg-avatar">Subir foto de perfil</label>
                        <input type="file" id="reg-avatar" accept="image/*">
                        <div class="avatar-holder">
                            <img id="reg-preview" src="" alt="Preview" class="hidden custom-avatar">
                        </div>
                    </div>
                    <button type="button" id="btn-register-submit" class="btn-whatsapp">Crear Cuenta</button>
                </div>
                <p class="switch-text">¿Ya tienes cuenta? <span id="go-to-login">Inicia sesión</span></p>
            </div>
        </div>
    </div>

    <!-- INTERFAZ PRINCIPAL -->
    <div id="chat-screen" class="window-screen hidden">
        <div class="whatsapp-layout-wrapper">
            
            <!-- BARRA LATERAL -->
            <aside class="whatsapp-sidebar">
                <header class="sidebar-header">
                    <div class="my-profile-stub">
                        <img id="current-user-avatar" src="" alt="Avatar" class="custom-avatar profile-main-img">
                        <div class="my-name-block">
                            <h3 id="current-user-name">---</h3>
                            <span id="current-user-nickname">@---</span>
                        </div>
                    </div>
                    <div class="header-actions-right">
                        <!-- ICONO CREAR GRUPO -->
                        <button type="button" id="open-group-modal-btn" class="btn-sidebar-action" title="Crear Grupo" style="margin-right:8px;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        </button>
                        <!-- ICONO PERFIL -->
                        <button type="button" id="open-profile-modal-btn" class="btn-sidebar-action" title="Editar Perfil" style="margin-right: 8px;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z"></path></svg>
                        </button>
                        <!-- ICONO SALIR -->
                        <button type="button" id="logout-btn" class="btn-sidebar-action" title="Cerrar Sesión">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        </button>
                    </div>
                </header>

                <!-- CANALES FIJOS -->
                <div class="global-tab-item-box">
                    <div id="btn-nav-global" class="contact-list-row active">
                        <div class="contact-avatar-wrapper">
                            <div class="global-avatar-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                            </div>
                        </div>
                        <div class="contact-info-block">
                            <div class="contact-row-top">
                                <h4># Chat Global</h4>
                            </div>
                            <p class="contact-sub">Comunidad pública general</p>
                        </div>
                        <span class="private-unread-badge hidden" id="unread-badge-global">0</span>
                    </div>
                </div>

                <!-- CONTENEDORES SCROLL -->
                <div class="contacts-scroll-area">
                    <span class="chats-section-title">Grupos y Directos</span>
                    <div id="users-connected-list"></div>
                </div>
            </aside>

            <!-- CHAT VIEWPORT -->
            <section class="whatsapp-viewport">
                <header class="viewport-header">
                    <div class="active-chat-meta">
                        <h2 id="header-channel-title">SayChat // Global</h2>
                    </div>
                </header>
                
                <main id="chat-box" class="whatsapp-chat-bg">
                    <!-- Mensajes dinámicos -->
                </main>
                
                <!-- STICKERS POPUP -->
                <div id="stickers-panel" class="stickers-popup hidden">
                    <div class="stickers-header">
                        <span>Panel de Stickers</span>
                        <label for="upload-sticker-input" class="btn-upload-stk">＋ Añadir</label>
                        <input type="file" id="upload-sticker-input" accept="image/*" class="hidden">
                    </div>
                    <div id="stickers-grid" class="stickers-grid-container"></div>
                </div>

                <!-- BARRA DE ESCRITURA INFERIOR -->
                <div id="chat-form-mock">
                    <button type="button" id="btn-toggle-stickers" class="btn-stk-trigger" title="Enviar Sticker">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
                    </button>
                    
                    <label for="chat-media-input" class="btn-stk-trigger" title="Subir Foto o Video" style="cursor:pointer; display:flex; align-items:center;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    </label>
                    <input type="file" id="chat-media-input" accept="image/*,video/*" class="hidden">

                    <input type="text" id="message-input" placeholder="Escribe un mensaje..." autocomplete="off">
                    <button type="button" id="btn-send-message" class="btn-send-whatsapp">Enviar</button>
                </div>
            </section>

        </div>
    </div>

    <!-- MODAL: EDITAR PERFIL -->
    <div id="profile-edit-modal" class="modal-overlay hidden">
        <div class="modal-card animate-fade">
            <div class="modal-header">
                <h3>Editar tu Perfil</h3>
                <button type="button" id="close-profile-modal-btn" class="btn-close-modal">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-avatar-section">
                    <label for="edit-avatar" class="modal-avatar-label">
                        <img id="modal-user-avatar" src="" alt="Avatar" class="custom-avatar modal-preview-img">
                        <div class="avatar-overlay-hint">Cambiar Foto</div>
                    </label>
                    <input type="file" id="edit-avatar" accept="image/*" class="hidden">
                </div>
                <div class="modal-input-section">
                    <label class="input-label-hint">Nombre de usuario (en pantalla)</label>
                    <input type="text" id="edit-name-input" placeholder="Tu nombre">
                </div>
                <button type="button" id="btn-save-profile-modal" class="btn-whatsapp">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <!-- MODAL: CREAR GRUPO -->
    <div id="group-create-modal" class="modal-overlay hidden">
        <div class="modal-card animate-fade">
            <div class="modal-header">
                <h3>Crear Nuevo Grupo</h3>
                <button type="button" id="close-group-modal-btn" class="btn-close-modal">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-avatar-section">
                    <label for="group-avatar-input" class="modal-avatar-label">
                        <div class="custom-avatar modal-preview-img" id="group-avatar-preview" style="display:flex; align-items:center; justify-content:center; background:#2a3942; font-size:24px;">👥</div>
                        <div class="avatar-overlay-hint">Subir Foto</div>
                    </label>
                    <input type="file" id="group-avatar-input" accept="image/*" class="hidden">
                </div>
                <div class="modal-input-section">
                    <label class="input-label-hint">Nombre del Grupo</label>
                    <input type="text" id="group-name-input" placeholder="Ej. Los Insanos 😈">
                </div>
                <div class="modal-input-section" style="width:100%;">
                    <label class="input-label-hint">Seleccionar Miembros</label>
                    <div id="group-members-checklist" class="members-checklist-box">
                        <!-- Integrantes inyectados -->
                    </div>
                </div>
                <button type="button" id="btn-save-group-submit" class="btn-whatsapp">Construir Grupo</button>
            </div>
        </div>
    </div>

    <!-- VISOR FLOTANTE UNIVERSAL -->
    <div id="sticker-viewer-overlay" class="modal-overlay hidden" style="background:rgba(0,0,0,0.85); z-index:5000;">
        <div id="media-viewer-container">
            <!-- Contenido inyectado por JS -->
        </div>
    </div>

    <div id="toast-notification" class="toast-popup hidden">Guardado</div>

    <script type="module" src="app.js"></script>
</body>
</html>
